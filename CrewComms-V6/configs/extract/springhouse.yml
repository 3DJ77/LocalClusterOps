report_slug: springhouse-deepdive
title: Springhouse - Deep Dive

compress:
  model: gemma4:26b
  ollama_url: http://127.0.0.1:11434
  target_tokens: 6000
  system_prompt: |
    You are a technical compression agent. Produce a concise summary of the
    input document that preserves: named projects, stated decisions, TODO
    items, technical constraints, quoted figures, and open questions. Drop:
    pleasantries, speculation, marketing prose, repetition across sections.
    Output plain prose. Never invent facts that are not in the source.
  timeout_seconds: 600

vision:
  enabled: true
  mode: bulk
  ollama_url: http://127.0.0.1:11434
  bulk:
    model: moondream:1.8b
    system_prompt: |
      Describe the image in 1-3 sentences. Identify what it depicts
      functionally (photo, diagram, schematic, screenshot, chart) and
      note any visible labels, text, or named components. Do not
      speculate beyond what is visible. Never invent facts.
  deep:
    model: granite3.2-vision:2b
    system_prompt: |
      Describe this technical drawing in detail. Identify: drawing type
      (schematic, mechanical print, PCB, blueprint), visible components
      and their labels, dimensions and callouts if present, net labels
      and connections if schematic, scale and orientation. Do not guess
      at components whose labels you cannot read - say "unreadable label
      at <location>" instead. Never invent.
  extensions: [.jpg, .jpeg, .png, .webp]
  max_per_source: 12
  max_bytes_per_image: 8000000
  timeout_seconds: 120

sources:
  - path: /home/jay/Desktop/Springhouse-Master-Plan-2026-v4.html
    as: master_plan_html
  - path: /home/jay/Current-Projects/Springhouse/Treasured Artifacts/docs
    as: core_docs
    glob: "*.md"
  - path: /home/jay/Current-Projects/Springhouse/Whitepapers
    as: whitepapers
    glob: "*.{pdf,odt}"
    convert: txt
    compress: true
    vision: false
  - path: /home/jay/Current-Projects/Springhouse/Power-System/Components
    as: power_component_images
    vision: bulk
  - path: /home/jay/Current-Projects/Springhouse/Treasured Artifacts/antigravity/spring-playhouse
    as: spring_playhouse_drawings
    vision: deep

briefing:
  sections:
    - heading: Scope + Mission
      from: master_plan_html
      extract: first_h1_section
    - heading: Operational State
      from: core_docs
      include: [operational_history.md, status_summary.md]
    - heading: TODO Snapshot by Category
      from: master_plan_html
      extract: todo_list_grouped
    - heading: Whitepaper Excerpts
      from: whitepapers
      limit_chars: 20000

csvs:
  - name: docs-by-category
    type: directory_counts
    roots:
      "All Docs": /home/jay/Current-Projects/Springhouse/All Docs
      "Whitepapers": /home/jay/Current-Projects/Springhouse/Whitepapers
      "Treasured Artifacts/docs": /home/jay/Current-Projects/Springhouse/Treasured Artifacts/docs
      "Treasured Artifacts/pdfs": /home/jay/Current-Projects/Springhouse/Treasured Artifacts/pdfs
    columns: [category, file_count]

  - name: todos-by-status
    type: html_todo_parse
    source: master_plan_html
    group_by: status
    columns: [status, count]

  - name: todos-by-category
    type: html_todo_parse
    source: master_plan_html
    group_by: category
    columns: [category, count]
